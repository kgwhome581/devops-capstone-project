apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts
  labels:
    app: accounts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounts
  template:
    metadata:
      labels:
        app: accounts
    spec:
      containers:
      - name: accounts
        image: IMAGE_NAME_HERE
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URI
          value: "postgresql://postgres:postgres@postgresql:5432/postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: accounts
  labels:
    app: accounts
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: accounts